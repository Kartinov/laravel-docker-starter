version: '3.8'

services:
  # 1. PHP & Laravel Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    user: "${APP_UID}:${APP_GID}" # 🌟 Updated to use our new variable names
    tty: true
    working_dir: /var/www
    volumes:
      - .:/var/www # This is the Bind Mount! Maps current folder to container

  # 2. Nginx Web Server Container
  webserver:
    image: nginx:alpine
    container_name: laravel_webserver
    restart: unless-stopped
    ports:
      - "13000:80" # Your PC talks to 13000 -> Nginx listens on 80
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf # Maps our custom server config
    depends_on:
      - app

  # 3. MySQL Database Container
  mysql:
    image: mysql:9.0
    container_name: laravel_mysql
    restart: unless-stopped
    tty: true
    ports:
      - "13002:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql

  # 4. phpMyAdmin Container
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - "13001:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql

volumes:
  dbdata:
    driver: local